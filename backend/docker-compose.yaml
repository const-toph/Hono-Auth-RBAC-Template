services:
  # ------------------------------
  # 🐘 PostgreSQL Database Service
  # ------------------------------
  database:
    image: postgres:17.6        # Use a specific version for consistency
    container_name: hono-auth-rbac-pg # (Optional) Easier to identify in Docker
    restart: unless-stopped     # Better than "always" for local dev
    env_file:
      - ./.env                  # Load environment variables from .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}         # Database name
      POSTGRES_USER: ${POSTGRES_USER}     # Database user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} # User password
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistent storage for DB data
    ports:
      - "5431:5432"             # Map local port 5432 → container 5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ------------------------------
  # 🧭 PgAdmin Web Interface
  # ------------------------------
  pgadmin:
    image: dpage/pgadmin4       # PgAdmin 4 web client
    container_name: hono-auth-rbac-pgadmin-ui  # Optional: name for clarity
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}   # Admin login email
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD} # Admin password
    ports:
      - "${PGADMIN_PORT:-5050}:80"      # Local 5050 → Container port 80
    depends_on:
      database:
        condition: service_healthy # Wait until Postgres is ready

# ------------------------------
# 💾 Persistent Docker Volumes
# ------------------------------
volumes:
  postgres_data:  # Stores actual Postgres data (persistent across restarts)
